appId: com.reveal.editor
productName: Reveal Editor
directories:
  output: release
  buildResources: resources
files:
  - dist/**/*
  - resources/**/*
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
mac:
  target:
    - dmg
  icon: resources/icon.icns
linux:
  target:
    - AppImage
  icon: resources/icon.png
